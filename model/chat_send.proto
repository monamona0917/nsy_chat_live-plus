syntax = "proto3";
package model;
option go_package = "./model";

// POST /user.v1.ChatService/SendChatMessage
message SendChatMessageRequest {
  string user_id = 1;
  string chat_room_id = 2;
  string content = 3;
  string image_path = 4;
  string user_upload_video_id = 5;
  string chat_message_id = 6;
  bool confirm_contains_forbidden_words_warning = 7;
}

message SendChatMessageResponse {
}

// POST /user.v1.LiveService/CreateCard
message CreateCardRequest {
  string user_id = 1;
  string content = 2;
  int64 coin_amount = 3;
  string live_id = 4;
  bool confirm_contains_forbidden_words_warning = 5;
}

message CreateCardResponse {
}

